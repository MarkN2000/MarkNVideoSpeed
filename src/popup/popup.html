<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MarkN Video Speed</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="title">MarkN Video Speed</h1>
  </header>

  <section class="section speed-section">
    <div class="current-speed">
      <span class="label">現在速度</span>
      <span id="speed-display" class="speed-value">1.00x</span>
    </div>
    <div class="button-row">
      <button id="btn-down" class="btn btn-circle" type="button" title="減速">−</button>
      <button id="btn-toggle" class="btn btn-toggle" type="button" title="1x / 指定速度トグル">→ 2.0x</button>
      <button id="btn-up" class="btn btn-circle" type="button" title="加速">＋</button>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">設定</h2>
    <div class="field">
      <label class="field-label" for="step-input">ステップ値</label>
      <input id="step-input" class="field-input" type="number" min="0.01" max="2" step="0.01">
    </div>
    <div class="field">
      <label class="field-label" for="preset-input">指定速度</label>
      <input id="preset-input" class="field-input" type="number" min="0.1" max="16" step="0.1">
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">ショートカットキー</h2>
    <div class="field">
      <label class="field-label">減速 (Down)</label>
      <button id="key-down" class="key-button" type="button" data-action="down">S</button>
    </div>
    <div class="field">
      <label class="field-label">加速 (Up)</label>
      <button id="key-up" class="key-button" type="button" data-action="up">D</button>
    </div>
    <div class="field">
      <label class="field-label">トグル</label>
      <button id="key-toggle" class="key-button" type="button" data-action="toggle">G</button>
    </div>
    <button id="reset-keys" class="btn btn-text" type="button">デフォルトに戻す</button>
  </section>

  <section class="section domain-section">
    <h2 class="section-title">現在のサイト</h2>
    <div id="current-domain" class="current-domain">—</div>
    <button id="toggle-exclude" class="btn btn-wide" type="button" disabled>—</button>
    <p id="domain-hint" class="hint hidden">変更後はページを再読み込みしてください</p>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script src="../lib/storage.js"></script>
  <script src="../lib/actions.js"></script>
  <script src="../lib/domainFilter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
