<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MarkN Video Speed</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="title">MarkN Video Speed</h1>
  </header>

  <section class="section speed-section">
    <div class="current-speed">
      <span class="label" data-i18n="labelCurrentSpeed">Current speed</span>
      <span id="speed-display" class="speed-value">1.00x</span>
    </div>
    <div class="button-row">
      <button id="btn-down" class="btn btn-circle" type="button" data-i18n-title="btnTitleSlowDown" title="Slow down">−</button>
      <button id="btn-toggle" class="btn btn-toggle" type="button" data-i18n-title="btnTitleToggle" title="Toggle 1x / target speed">→ 2.0x</button>
      <button id="btn-up" class="btn btn-circle" type="button" data-i18n-title="btnTitleSpeedUp" title="Speed up">＋</button>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title" data-i18n="sectionSettings">Settings</h2>
    <div class="field">
      <label class="field-label" for="step-input" data-i18n="labelStep">Step</label>
      <input id="step-input" class="field-input" type="number" min="0.01" max="2" step="0.01">
    </div>
    <div class="field">
      <label class="field-label" for="target-input" data-i18n="labelTargetSpeed">Target speed</label>
      <input id="target-input" class="field-input" type="number" min="0.1" max="16" step="0.1">
    </div>
  </section>

  <section class="section">
    <h2 class="section-title" data-i18n="sectionShortcuts">Shortcuts</h2>
    <div class="field">
      <label class="field-label" data-i18n="labelKeyDown">Slow down</label>
      <button id="key-down" class="key-button" type="button" data-action="down">S</button>
    </div>
    <div class="field">
      <label class="field-label" data-i18n="labelKeyUp">Speed up</label>
      <button id="key-up" class="key-button" type="button" data-action="up">D</button>
    </div>
    <div class="field">
      <label class="field-label" data-i18n="labelKeyToggle">Toggle</label>
      <button id="key-toggle" class="key-button" type="button" data-action="toggle">G</button>
    </div>
    <button id="reset-keys" class="btn btn-text" type="button" data-i18n="btnResetKeys">Reset to defaults</button>
  </section>

  <section class="section domain-section">
    <h2 class="section-title" data-i18n="sectionCurrentSite">Current site</h2>
    <div id="current-domain" class="current-domain">—</div>
    <button id="toggle-exclude" class="btn btn-wide" type="button" disabled>—</button>
    <p id="domain-hint" class="hint hidden" data-i18n="hintReload">Reload the page after changing</p>
  </section>

  <footer class="footer">
    <a href="https://github.com/MarkN2000/MarkNVideoSpeed" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <div id="toast" class="toast hidden"></div>

  <script src="../lib/storage.js"></script>
  <script src="../lib/actions.js"></script>
  <script src="../lib/domainFilter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
