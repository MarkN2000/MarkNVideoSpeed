name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create distribution zip
        run: |
          ZIP_NAME="MarkNVideoSpeed-${GITHUB_REF_NAME}.zip"
          zip -r "${ZIP_NAME}" manifest.json src assets _locales LICENSE
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
